display_information:
  name: Planka Unfurl
  description: Shows rich previews for Planka card links in Slack
  background_color: "#1a1a2e"

features:
  bot_user:
    display_name: Planka Unfurl
    always_online: true
  unfurl_domains:
    - tasks.entouraige.com

oauth_config:
  scopes:
    bot:
      - links:read
      - links:write
      - chat:write

settings:
  event_subscriptions:
    bot_events:
      - link_shared
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
